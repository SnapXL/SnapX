name: Lint Commit Messages
on: [push, pull_request]
  
permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure commit message(s) is/are compliant (conventional commits via commitlint)
        uses: wagoid/commitlint-github-action@v6
