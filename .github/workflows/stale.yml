name: Close stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 365
          days-before-pr-stale: 90
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: "This issue is being marked as stale due to inactivity."
          stale-pr-message: "This PR is being marked as stale due to inactivity."
          close-issue-message: "This issue has automatically been closed due to inactivity."
          close-pr-message: "This PR has automatically been closed due to inactivity."
          exempt-issue-labels: "bug,enhancement,todo"
          operations-per-run: 100
