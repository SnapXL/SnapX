name: Build SnapX

on:
  push:
    branches:
      - "**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "**/*.md"
      - "**/*.spec"
      - "**/*.gitignore"
      - "**/*.gitattributes"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ${{matrix.os}}
    timeout-minutes: 65

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm, macos-latest, macos-13, windows-2025 ]
        configuration:
          - Release
          - Debug

    env:
      SOLUTION_FILE_PATH: SnapX.slnx
      ASSEMBLY_INFO_PATH: Directory.build.props

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore --packages ./vendor SnapX.sln
      - name: Cache .NET NuGet packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-${{ runner.arch }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: 🛠 Generate NuGet.config and Directory.Build.props
        run: |
          cat > NuGet.config <<EOF
              <?xml version="1.0" encoding="utf-8"?>
              <configuration>
              <packageSources>
              <clear />
              <add key="Local" value="vendor" />
              </packageSources>
              </configuration>
          EOF
      - name: 🛠 Ensure RestorePackagesPath in Directory.Build.props
        run: |
          FILE="Directory.Build.props"
          PATH_NODE="//Project/PropertyGroup/RestorePackagesPath"

          # If file exists and node is missing, insert it
          if [ -f "$FILE" ]; then
            if ! xmlstarlet sel -t -v "$PATH_NODE" "$FILE" 2>/dev/null | grep -q .; then
              echo "🔧 Inserting <RestorePackagesPath>vendor</RestorePackagesPath>..."
              xmlstarlet ed --inplace \
                -s "//Project/PropertyGroup[1]" -t elem -n "RestorePackagesPath" -v "vendor" \
                "$FILE"
            else
              echo "✅ RestorePackagesPath already set."
            fi
          else
            echo "❌ Directory.Build.props does not exist. Cannot insert RestorePackagesPath for Vendored build. Build will FAIL."
            exit 1
          fi
      - name: Upload Source With Dependencies
        if: matrix.configuration == 'Debug' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-Vendored-Source-${{ runner.arch }}
          path: .
          include-hidden-files: false
      - name: Ensure commit message is compliant (conventional commits via commitlint)
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && runner.arch == 'X64'
        uses: wagoid/commitlint-github-action@v6
      - name: Enforce code style using dotnet format
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && runner.arch == 'X64'
        run: dotnet format --exclude build --verify-no-changes -v diagnostic --exclude build SnapX.sln
      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && runner.arch == 'X64'
        with:
          #fix: true
          globs: |
            **/*.md
            !LICENSE.md
      - name: Publish Windows ARM64 (CLI)
        if: matrix.os == 'windows-2025'
        working-directory: SnapX.CLI
        run: dotnet publish -c ${{ matrix.configuration }} -r win-arm64
      - name: Publish Windows ARM64 (Avalonia)
        if: matrix.os == 'windows-2025'
        working-directory: SnapX.Avalonia
        run: dotnet publish -c ${{ matrix.configuration }} -r win-arm64
      - name: Upload ARM64 Publish artifact (CLI)
        if: matrix.os == 'windows-2025'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-CLI-${{ matrix.configuration }}-${{ runner.os }}-ARM64
          path: "SnapX.CLI/bin/${{ matrix.configuration }}/net9.0/win-arm64/publish"
          compression-level: 9
          if-no-files-found: error
      - name: Upload ARM64 Publish artifact (Avalonia)
        if: matrix.os == 'windows-2025'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-Avalonia-${{ matrix.configuration }}-${{ runner.os }}-ARM64
          path: "SnapX.Avalonia/bin/${{ matrix.configuration }}/net9.0/win-arm64/publish"
          compression-level: 9
          if-no-files-found: error
      - name: Publish
        if: matrix.os == 'windows-2025'
        run: |
          ./build.ps1 --configuration ${{ matrix.configuration }}
      - name: Install NativeAOT Linux Deps
        if: runner.os == 'Linux'
        run: "sudo apt update && sudo apt install -y clang zlib1g-dev libcurl4-openssl-dev"
      - name: Publish
        if: matrix.os != 'windows-2025'
        run: ./build.sh --configuration ${{ matrix.configuration }}

      - name: Upload Publish artifact (CLI)
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-CLI-${{ matrix.configuration }}-${{ runner.os }}-${{ runner.arch }}
          path: "Output/snapx"
          compression-level: 9
          if-no-files-found: error
      - name: Upload Publish artifact (Avalonia)
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-Avalonia-${{ matrix.configuration }}-${{ runner.os }}-${{ runner.arch }}
          path: "Output/snapx-ui"
          compression-level: 9
          if-no-files-found: error
