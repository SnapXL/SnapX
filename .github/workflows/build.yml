name: Build SnapX

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "**/*.md"
      - "**/*.spec"
      - "**/*.gitignore"
      - "**/*.gitattributes"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ${{matrix.os}}
    timeout-minutes: 65

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm, macos-latest, macos-13, windows-2025, windows-11-arm ]
        configuration:
          - Release
          - Debug

    env:
      SOLUTION_FILE_PATH: SnapX.slnx
      ASSEMBLY_INFO_PATH: Directory.build.props

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Free Disk Space (Ubuntu)
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && runner.arch == 'X64'
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: false
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x.x
      - name: Restore
        run: dotnet restore --packages ./vendor SnapX.slnx
      - name: Restore build project
        run: dotnet restore --packages ./vendor build/build.csproj
      - name: Cache .NET NuGet packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-${{ runner.arch }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Install NativeAOT Linux Deps
        if: runner.os == 'Linux'
        run: "sudo apt update && sudo apt install -y clang zlib1g-dev"
      - name: Install Rust toolchain
        if: runner.os == 'macOS'
        run: brew install rust
      - name: Install xmlstarlet
        if: matrix.configuration == 'Debug' && runner.os == 'Linux'
        run: sudo apt install -y xmlstarlet
      - name: Update fallback version
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && always()
        continue-on-error: true
        run: |
          raw_version=$(./build.sh --version | grep -Eo '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.\+]+)?')
          fallback_version=$(echo "$raw_version" | sed 's/-.*//')
          echo "Fallback version: $fallback_version"
          sed -i "s|<Version>.*</Version>|<Version>${fallback_version}</Version>|" Directory.Build.props

      - name: Commit fallback version
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && runner.arch == 'X64' && always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Extract the new fallback version from the props file
          fallback_version=$(grep -oP '(?<=<Version>).*?(?=</Version>)' Directory.Build.props)

          # Check if there are any changes
          if ! git diff --quiet Directory.Build.props; then
            git add Directory.Build.props
            git commit -m "chore(release): update fallback version to ${fallback_version}"
            git push
          else
            echo "No changes to commit."
          fi
      - name: 🛠 Generate NuGet.config
        if: matrix.configuration == 'Debug' && runner.os == 'Linux'
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<configuration>' \
            '  <packageSources>' \
            '    <clear />' \
            '    <add key="Local" value="vendor" />' \
            '  </packageSources>' \
            '</configuration>' > NuGet.config
      - name: 🛠 Ensure RestorePackagesPath in Directory.Build.props
        if: matrix.configuration == 'Debug' && runner.os == 'Linux'
        run: |
          FILE="Directory.Build.props"
          PATH_NODE="//Project/PropertyGroup/RestorePackagesPath"
          # If file exists and node is missing, insert it
          if [ -f "$FILE" ]; then
            if ! xmlstarlet sel -t -v "$PATH_NODE" "$FILE" 2>/dev/null | grep -q .; then
              echo "🔧 Inserting <RestorePackagesPath>vendor</RestorePackagesPath>..."
              xmlstarlet ed --inplace \
                -s "//Project/PropertyGroup[1]" -t elem -n "RestorePackagesPath" -v "vendor" \
                "$FILE"
            else
              echo "✅ RestorePackagesPath already set."
            fi
          else
            echo "❌ Directory.Build.props does not exist. Cannot insert RestorePackagesPath for Vendored build. Build will FAIL."
            exit 1
          fi
      # Packagers: This vendored source does not have the APIKeys SnapX uses.
      # I cannot provide them in public source code.
      - name: Upload Source With Dependencies
        if: matrix.configuration == 'Debug' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-Vendored-Source-${{ runner.arch }}
          path: .
          include-hidden-files: false
      - name: Download API keys
        env:
          API_KEYS: ${{ secrets.API_KEYS }}
        if: env.API_KEYS != '' && runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Invoke-WebRequest -Uri $env:API_KEYS -OutFile "SnapX.Core\Upload\APIKeysLocal.cs" -ErrorAction Stop | Out-Null
          } catch {
            throw "Failed to download API keys. Error has been redacted for security reasons."
          }
      - name: Download API keys
        env:
          API_KEYS: ${{ secrets.API_KEYS }}
        if: env.API_KEYS != '' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "$API_KEYS" -o SnapX.Core/Upload/APIKeysLocal.cs
      - name: Enforce code style using dotnet format
        if: matrix.configuration == 'Debug' && runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          dotnet format --verify-no-changes -v diagnostic SnapX.slnx \
            --include $(find . -type f -name '*.cs' ! -path './build/*' ! -path './SnapX.Core/Upload/APIKeysLocal.cs')
      - name: Publish
        if: runner.os == 'Windows'
        run: ./build.ps1 --configuration ${{ matrix.configuration }}
      - name: Publish
        if: runner.os != 'Windows'
        run: ./build.sh --configuration ${{ matrix.configuration }}
      - name: Import GPG key
        id: import_gpg
        if: github.event_name != 'pull_request' && matrix.configuration == 'Release' && runner.os == 'Linux'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_push_gpgsign: false
      - name: Assemble SnapX UI Tarball
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        run: "./build.sh tarball --assembly snapx-ui"
      - name: Assemble SnapX CLI Tarball
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        run: "./build.sh tarball --assembly snapx"
      - name: Get Arch
        id: get-arch
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        run: echo "arch=$(arch)" >> "$GITHUB_OUTPUT"
      - name: Assemble the AppImage
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        run: |
          wget -c https://github.com/$(wget -q https://github.com/probonopd/go-appimage/releases/expanded_assets/continuous -O - | grep "mkappimage-.*-${{ steps.get-arch.outputs.arch }}.AppImage" | head -n 1 | cut -d '"' -f 2)
          chmod +x mkappimage-*.AppImage
          mv mkappimage-* mkappimage
          sudo mv mkappimage /usr/local/bin
          sudo apt install -y desktop-file-utils squashfs-tools zsync appstream
          ./build.sh appimage --assembly snapx-ui
      - name: Assemble Runfile
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        run: |
          ./build.sh runfile --assembly snapx-ui
      - name: Upload Built AppImage 📦
        uses: actions/upload-artifact@v4
        if: always() && matrix.configuration == 'Release' && runner.os == 'Linux'
        with:
          name: SnapX-AppImage-${{ runner.arch }}
          if-no-files-found: error
          path: |
            *.AppImage
            *.AppImage.zsync
      - name: Upload Built Runfile 📦
        uses: actions/upload-artifact@v4
        if: always() && matrix.configuration == 'Release' && runner.os == 'Linux'
        with:
          name: SnapX-Runfile-${{ runner.arch }}
          if-no-files-found: error
          path: "*.run"
      - name: Upload artifact (CLI - Release on Linux)
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-CLI-${{ matrix.configuration }}-${{ runner.os }}-${{ runner.arch }}
          path: "SnapX-CLI*"
          compression-level: 9
          if-no-files-found: error

      - name: Upload artifact (CLI - Non-Release or non-Linux)
        if: matrix.configuration != 'Release' || runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-CLI-${{ matrix.configuration }}-${{ runner.os }}-${{ runner.arch }}
          path: "Output/snapx"
          compression-level: 9
          if-no-files-found: error
      - name: Upload artifact (Avalonia - Release on Linux)
        if: matrix.configuration == 'Release' && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-Avalonia-${{ matrix.configuration }}-${{ runner.os }}-${{ runner.arch }}
          path: "SnapX-UI*"
          compression-level: 9
          if-no-files-found: error

      - name: Upload artifact (Avalonia - Non-Release or non-Linux)
        if: matrix.configuration != 'Release' || runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SnapX-Avalonia-${{ matrix.configuration }}-${{ runner.os }}-${{ runner.arch }}
          path: "Output/snapx-ui"
          compression-level: 9
          if-no-files-found: error
  test-artifacts:
    runs-on: ubuntu-24.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu:20.04
          - mageia:latest
          - redhat/ubi9
          - opensuse/leap:latest
          - debian:bookworm
          - archlinux:latest
          - fedora:39
    container:
      image: ${{ matrix.os }}
      options: >-
        --privileged
        --cap-add=SYS_ADMIN
        --cap-add=SYS_PTRACE

    steps:
      # See https://github.com/actions/download-artifact/issues/343 & https://github.com/actions/download-artifact/issues/339 to see why this is pinned. If you bump this version, you will be FIRED. >:(
      - uses: actions/download-artifact@v4.1.8
        continue-on-error: true
        with:
          merge-multiple: true

      - name: Run binary tests (filename-based arch detection)
        run: |
          chmod +x *.run || true
          chmod +x *.AppImage || true

          is_x86_64_filename() {
            echo "$1" | grep -iE 'x86[-_]?64|amd64|x64' &>/dev/null
          }

          if ls ./*.run &>/dev/null; then
            for BINARY in *.run; do
              echo "Checking architecture (by filename) of $BINARY"
              if is_x86_64_filename "$BINARY"; then
                echo "Running binary: $BINARY"
                ./"$BINARY" --version || echo "$BINARY failed to run"
              else
                echo "Skipping $BINARY (not x86_64 by filename)"
              fi
            done
          fi

          if ls ./*.AppImage &>/dev/null; then
            for BINARY in *.AppImage; do
              echo "Checking architecture (by filename) of $BINARY"
              if is_x86_64_filename "$BINARY"; then
                echo "Running binary: $BINARY"
                ./"$BINARY" --version || echo "$BINARY failed to run"
              else
                echo "Skipping $BINARY (not x86_64 by filename)"
              fi
            done
          fi
