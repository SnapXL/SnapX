title: SnapX
# Snapcraft forced me to change the name of the package because they believe they own the word snap.
# More specifically, when a package starts with those four letters.
# I surely hope this package rename won't confuse users.
name: ui-snapx
summary: Screenshot tool that handles images, text, and video (fork of ShareX)
description: |
  SnapX is a free, open-source, cross-platform tool that lets you capture or record any area of your screen and instantly share it with a single keypress.
  Upload images, videos, text, and more to multiple supported destinations—all with ease
  This is a port of the original ShareX application to Linux.
  It is not an official release and is not affiliated with the original ShareX project.
  This project is under development and is *not* ready for use.
  Supports PNG (including animated variant), WEBP (including animated variant), JPEG, GIFs (should be smaller than your typical ShareX GIF), TIFF, and BMP image formats.
  Cross-platform OCR powered by PaddleOCR that rivals PowerToys OCR, TesseractOCR, & Windows 10 built in OCR in accuracy
version: '0.4.0'
license: GPL-3.0-or-later
source-code: "https://github.com/SnapXL/SnapX"
adopt-info: ui-snapx
grade: devel
base: core24
confinement: strict
compression: lzo
contact: "brycengranville+snapcraft.snapx@outlook.com"
issues: "https://github.com/SnapXL/SnapX/issues"
icon: "./packaging/usr/share/icons/256x256/apps/io.github.SnapXL.SnapX.png"
donation:
  - https://ko-fi.com/BrycensRanch
  - https://liberapay.com/BrycensRanch
  - https://github.com/sponsors/BrycensRanch
# By default, snaps have an epoch of ‘0’. When a new version breaks data compatibility with this old version, incrementing the epoch in the new release stops those old users automatically refreshing to the new version.
epoch: 0

assumes:
  - snapd2.39
  - snap-env

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]
  # For the time being, Microsoft hasn't removed support for Arm32 NativeAOT... yet
  armhf:
    build-on: [armhf]
    build-for: [armhf]


apps:
  ui-snapx:
    # Avalonia uses GNOME for some of its stuff. We just really need the base libraries.
    extensions: [gnome]
    command: usr/lib/snapx/snapx-ui
    # Snap has a issue detecting our icons and thus produces an error. Working on it.
    desktop: usr/share/applications/io.github.SnapXL.SnapX.desktop
    plugs:
      - network
      - alsa
      - pipewire
      - pulseaudio
      - audio-playback
      - audio-record # FFmpeg Screen Capture is coming soon
      - desktop
      - media-control # FFmpeg Screen Capture
#      - browser-native-messaging Super privileged interface
#plugs:
#  browser-native-messaging:
#    interface: personal-files
#    write:
#      - $HOME/.mozilla/native-messaging-hosts/host-manifest-firefox.json
#      - $HOME/.config/chromium/NativeMessagingHosts/host-manifest-chrome.json
#      - $HOME/.config/google-chrome/NativeMessagingHosts/host-manifest-chrome.json
#      - $HOME/.config/microsoft-edge/NativeMessagingHosts/host-manifest-chrome.json
#      - $HOME/.config/vivaldi/NativeMessagingHosts/host-manifest-chrome.json
#      - $HOME/.config/BraveSoftware/Brave-Browser/NativeMessagingHosts/host-manifest-chrome.json
#      - $HOME/.local/share/torbrowser/tbb/x86_64/tor-browser_en-US/Browser/TorBrowser/Data/Browser/.mozilla/native-messaging-hosts/host-manifest-firefox.json

package-repositories:
  - type: apt
    ppa: ubuntuhandbook1/ffmpeg8

parts:
  ui-snapx:
    parse-info: [usr/share/metainfo/io.github.SnapXL.SnapX.metainfo.xml]
    plugin: nil
    override-build: |
      ./build.sh install --no-color --no-extended-chars --prefix /usr --dest-dir $SNAPCRAFT_PART_INSTALL
      rm $SNAPCRAFT_PART_INSTALL/usr/bin/snapx $SNAPCRAFT_PART_INSTALL/usr/lib/snapx/snapx
    build-packages:
      - git
      - clang
      - zlib1g-dev
      - libsm6
      - ca-certificates
      - libicu74
    build-environment:
      - PKGTYPE: SNAP
    stage-packages:
      - x11-xserver-utils  # for `xrandr`
      - pciutils           # for `lspci`
      - mesa-utils         # for `glxinfo`
      - ffmpeg             # for screen capture & sounds
                           # I acknowledge ffplay probably is broken, it has a million and one dependencies.
    source: .
    override-pull: |
      craftctl default
      version=$(./build.sh --version | tail -n1)

      # Truncate the version to a maximum of 32 characters
      truncated_version=$(echo "$version" | cut -c1-32)

      # Set the version with truncation. Good luck everyone else! :)
      snapcraftctl set-version "$truncated_version"
  # TLS 1.3 support
  msquic:
    plugin: cmake
    source-type: git
    source: https://github.com/microsoft/msquic.git
    source-tag: v2.5.4
    cmake-parameters: [-DCMAKE_INSTALL_PREFIX=/usr]
lint:
  ignore:
    - library:
        - usr/lib/*/libEGL_mesa.so.*
        - usr/lib/*/libGLX_mesa.so.*
        - usr/lib/*/libicuio.so.*
        - usr/lib/*/libicutest.so.*
        - usr/lib/*/libicutu.so.*
        - usr/lib/*/libxcb-glx.so.*
        - usr/lib/*/libxcb-shm.so.*
        - usr/lib/*libicui18n.so.*
        - usr/lib/*/libcaca++.so.*
        - usr/lib/*/libcjson_utils.so.*
        - usr/lib/*/libdcerpc-server.so.*
        - usr/lib/*/libfftw3_omp.so.*
        - usr/lib/*/libfftw3_threads.so.*
        - usr/lib/*/libflite_cmu_grapheme_lang.so.*
        - usr/lib/*/libflite_cmu_indic_lang.so.*
        - usr/lib/*/libflite_cmu_grapheme_lex.so.*
        - usr/lib/*/libflite_cmu_indic_lex.so.*
        - usr/lib/*/libflite_cmu_time_awb.so.*
        - usr/lib/*/libhwy_contrib.so.*
        - usr/lib/*/libhwy_test.so.*
        - usr/lib/*/libjacknet.so.*
        - usr/lib/*/libjackserver.so.*
        - usr/lib/*/libnetapi.so.*
        - usr/lib/*/libpulse-simple.so.*
        - usr/lib/*/libtheora.so.*
        - usr/lib/*/libzvbi-chains.so.*
        - usr/lib/*/libmsquic.so.*
